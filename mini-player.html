<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solara Mini Player</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/mini-player.css">
</head>
<body>
    <main class="mini-player" aria-label="Solara 迷你播放器">
        <button class="mini-close" id="miniCloseBtn" type="button" aria-label="关闭">
            <i class="fas fa-xmark" aria-hidden="true"></i>
        </button>
        <div class="mini-cover" id="miniCover">
            <i class="fas fa-music" aria-hidden="true"></i>
        </div>
        <section class="mini-meta">
            <h1 id="miniTitle">选择一首歌曲</h1>
            <p id="miniArtist">未知艺术家</p>
        </section>
        <div class="mini-controls" role="group" aria-label="播放控制">
            <button id="miniPrevBtn" type="button" aria-label="上一首">
                <i class="fas fa-backward-step" aria-hidden="true"></i>
            </button>
            <button class="mini-play" id="miniPlayBtn" type="button" aria-label="播放">
                <i class="fas fa-play" aria-hidden="true"></i>
            </button>
            <button id="miniNextBtn" type="button" aria-label="下一首">
                <i class="fas fa-forward-step" aria-hidden="true"></i>
            </button>
        </div>
        <div class="mini-progress">
            <div class="mini-time">
                <span id="miniCurrentTime">00:00</span>
                <span id="miniDuration">00:00</span>
            </div>
            <input id="miniProgressBar" type="range" min="0" max="0" step="0.1" value="0" aria-label="播放进度">
        </div>
    </main>
    <script src="js/mini-player.js"></script>
</body>
</html>
